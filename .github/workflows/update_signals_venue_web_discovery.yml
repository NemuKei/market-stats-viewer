name: Update event signals data (Venue Web Discovery)

on:
  workflow_dispatch:
  schedule:
    - cron: "35 4 * * *" # daily (UTC)

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-signals-venue-web-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen

      - name: Optional Crawl4AI setup
        if: ${{ vars.VENUE_WEB_DISCOVERY_ENABLE_CRAWL4AI == 'true' }}
        run: |
          uv sync --frozen --extra crawl4ai
          uv run crawl4ai-setup
          uv run crawl4ai-doctor

      - name: Update venue web discovery signals
        run: |
          uv run python -m scripts.update_event_signals_data --only venue_web_discovery

      - name: Build LP events
        run: |
          uv run python -m scripts.build_lp_events

      - name: Validate venue web discovery outputs
        run: |
          uv run python -m pytest tests/test_venue_web_discovery_source.py tests/test_venue_web_discovery_extract.py tests/test_build_lp_events.py tests/test_build_external_events_manifest.py
          uv run python -m scripts.venue_web_discovery_extract --help
          mkdir -p tmp
          uv run python -m scripts.build_external_events_manifest --release-tag external-events-latest --output tmp/manifest.json

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config merge.ours.driver true
            git add data/event_signals.sqlite data/lp_events.json data/venue_web_discovery_config.json
            git commit -m "chore: update event signals data (venue web discovery)"
            branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git pull --rebase -X ours origin "$branch" && git push origin "HEAD:$branch" && break
              git rebase --abort || true
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries"
                exit 1
              fi
              echo "Push retry $i failed. Retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
