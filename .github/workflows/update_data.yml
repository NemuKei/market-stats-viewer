name: Update market stats data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # 毎週月曜 03:00 UTC（日本時間だと月曜12:00）

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen --no-dev

      - name: Update data
        run: |
          uv run python -m scripts.update_data
          uv run python -m scripts.update_tcd_data
          uv run python -m scripts.update_icd_data
          uv run python -m scripts.update_ta_data
          uv run python -m scripts.update_airport_volume_data
          uv run python -m scripts.update_events_data
          uv run python -m scripts.build_events_artist_inferred

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ scripts/ app.py pyproject.toml uv.lock README.md
            git commit -m "chore: update market stats data"
            branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git pull --rebase origin "$branch" && git push origin "HEAD:$branch" && break
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries"
                exit 1
              fi
              echo "Push retry $i failed. Retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
