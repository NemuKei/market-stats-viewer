name: Update events official data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 */3 * *" # 各月1日から3日刻みで 04:00 UTC（日本時間 13:00）

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-events-official:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen --no-dev

      - name: Update events official data
        run: |
          uv run python -m scripts.update_events_data --skip-artist-inference
          uv run python -m scripts.build_events_artist_inferred

      - name: Build ticketjam supplement report
        run: |
          uv run python -m scripts.build_ticketjam_supplement_report

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config merge.ours.driver true
            git add data/ scripts/ app.py pyproject.toml uv.lock README.md
            git commit -m "chore: update events official data"
            branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git pull --rebase -X ours origin "$branch" && git push origin "HEAD:$branch" && break
              git rebase --abort || true
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries"
                exit 1
              fi
              echo "Push retry $i failed. Retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
