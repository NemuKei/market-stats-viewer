name: Update event signals data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *" # 12時間ごと（UTC）

permissions:
  contents: write

jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen --no-dev

      - name: Update event signals
        run: |
          uv run python -m scripts.update_event_signals_data

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ scripts/ app.py docs/ README.md
            git commit -m "chore: update event signals data"
            branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git pull --rebase origin "$branch" && git push origin "HEAD:$branch" && break
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries"
                exit 1
              fi
              echo "Push retry $i failed. Retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
