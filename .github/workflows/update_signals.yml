name: Update event signals data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *" # 12時間ごと（UTC）

permissions:
  contents: write

jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen --no-dev

      - name: Update event signals
        run: |
          uv run python -m scripts.update_event_signals_data

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ scripts/ app.py docs/ README.md
            git commit -m "chore: update event signals data"
            git push
          else
            echo "No changes to commit."
          fi
