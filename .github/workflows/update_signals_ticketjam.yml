name: Update event signals data (Ticketjam)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *" # daily (UTC)

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-signals-ticketjam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen --no-dev

      - name: Update event signals (ticketjam only)
        run: |
          uv run python -m scripts.update_event_signals_data --only ticketjam_events

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config merge.ours.driver true
            git add data/ scripts/ app.py docs/ README.md
            git commit -m "chore: update event signals data (ticketjam)"
            branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git pull --rebase -X ours origin "$branch" && git push origin "HEAD:$branch" && break
              git rebase --abort || true
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries"
                exit 1
              fi
              echo "Push retry $i failed. Retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
