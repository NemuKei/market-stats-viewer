name: Update event signals data (Ticketjam)

on:
  workflow_dispatch:
    inputs:
      bootstrap_full:
        description: "Ticketjam全件再評価を実行する（会場ページ全巡回 + sitemap補完）"
        type: boolean
        required: false
        default: false
      bootstrap_max_sitemaps:
        description: "bootstrap時に走査するsitemap数（hybrid補完用）"
        type: string
        required: false
        default: "8000"
      bootstrap_max_event_urls:
        description: "bootstrap時に保持するevent URL上限（hybrid補完用）"
        type: string
        required: false
        default: "50000"
      discovery_mode:
        description: "Ticketjam discovery mode（hybrid / prefecture_month / prefecture_month_hybrid / sitemap / venue_pages）"
        type: string
        required: false
        default: "hybrid"
  schedule:
    - cron: "15 3 * * *" # daily (UTC)

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-signals-ticketjam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: |
          uv sync --frozen --no-dev

      - name: Update event signals (ticketjam only)
        run: |
          args=(--only ticketjam_events)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.discovery_mode }}" ]; then
            args+=(--ticketjam-discovery-mode "${{ inputs.discovery_mode }}")
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.bootstrap_full }}" = "true" ]; then
            args+=(
              --ticketjam-bootstrap-full
              --ticketjam-bootstrap-max-sitemaps "${{ inputs.bootstrap_max_sitemaps }}"
              --ticketjam-bootstrap-max-event-urls "${{ inputs.bootstrap_max_event_urls }}"
            )
          else
            :
          fi
          uv run python -m scripts.update_event_signals_data "${args[@]}"

      - name: Build ticketjam supplement report
        run: |
          uv run python -m scripts.build_ticketjam_supplement_report

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config merge.ours.driver true
            git add data/ scripts/ app.py docs/ README.md
            git commit -m "chore: update event signals data (ticketjam)"
            branch="${GITHUB_REF_NAME:-main}"
            for i in 1 2 3; do
              git pull --rebase -X ours origin "$branch" && git push origin "HEAD:$branch" && break
              git rebase --abort || true
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 retries"
                exit 1
              fi
              echo "Push retry $i failed. Retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi
